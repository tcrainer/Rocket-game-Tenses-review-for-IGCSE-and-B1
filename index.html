<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Tense Rocket Race - Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        .space-track {
            background: linear-gradient(90deg, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0.8) 100%);
            border-bottom: 1px solid #1e293b;
            position: relative;
            height: 34px; 
        }

        .rocket {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
            z-index: 10;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .selected-point {
            background-color: #10b981 !important; 
            border-color: #34d399 !important;
            transform: scale(1.02);
            color: white !important;
        }

        #answer-card {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        #answer-card.visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transition: opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Setup Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950 overflow-y-auto">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-700 shadow-2xl max-w-2xl w-full my-auto">
            <h1 class="text-3xl font-bold mb-2 text-center text-sky-400">German Rocket Race</h1>
            <p class="text-slate-500 text-center mb-6 text-sm">Auxiliaries (hat/ist), "um...zu" clauses & Foundations</p>
            
            <div class="space-y-6">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-800/50 p-4 rounded-xl">
                    <div class="flex items-center gap-4">
                        <label class="text-sm font-medium text-slate-400">Astronauts:</label>
                        <input type="number" id="student-count" min="1" max="16" value="4" 
                               class="w-16 bg-slate-800 border border-slate-600 rounded p-1 text-white outline-none">
                    </div>
                    <div class="flex gap-2">
                        <button id="mode-race" onclick="setMode('race')" class="px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all">Race Mode</button>
                        <button id="mode-solo" onclick="setMode('solo')" class="px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all">Solo/Practice</button>
                    </div>
                </div>

                <div id="name-input-container">
                    <div id="name-inputs" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Names generated here -->
                    </div>
                </div>

                <button onclick="startGame()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-900/20 uppercase tracking-widest">
                    Ignition & Launch
                </button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden flex flex-col h-screen">
        
        <!-- Tracks -->
        <div id="tracks-container" class="h-[35%] flex flex-col overflow-y-auto custom-scrollbar relative bg-slate-950 border-b border-slate-800">
            <div id="stars"></div>
        </div>

        <!-- Question Area -->
        <div class="h-[65%] bg-slate-900 p-4 flex flex-col relative">
            <div class="max-w-6xl mx-auto w-full flex flex-col h-full">
                
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="verb-title" class="text-sky-400 font-bold text-xl uppercase tracking-widest">Verb</h2>
                        <div id="step-indicator" class="flex gap-2 mt-1">
                            <!-- Step dots -->
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <span id="score-info" class="hidden text-xs text-slate-500 self-center mr-4">Target: 30 Points</span>
                        <button onclick="nextVerb()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-full text-[10px] font-bold flex items-center gap-2 border border-slate-700 transition-all">
                            Skip Verb <span>⏭️</span>
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 flex-grow overflow-hidden">
                    
                    <!-- English Side -->
                    <div id="challenge-card" onclick="revealCurrentStep()" class="bg-slate-800/50 border-2 border-dashed border-sky-500/30 rounded-xl p-6 cursor-pointer hover:border-sky-500/60 transition-all flex flex-col items-center justify-center text-center group overflow-y-auto custom-scrollbar">
                        <span class="text-sky-500/50 text-[10px] font-mono mb-2 group-hover:text-sky-400">ENGLISH CHALLENGE</span>
                        <div id="english-text" class="text-lg md:text-xl font-medium leading-relaxed">
                            <!-- Step text -->
                        </div>
                        <div class="mt-4 text-sky-500 text-[10px] animate-bounce opacity-50">Click to reveal German</div>
                    </div>

                    <!-- German Side -->
                    <div id="answer-card" class="bg-emerald-900/5 border-2 border-emerald-500/10 rounded-xl p-4 flex flex-col overflow-hidden">
                        <div class="text-center flex-grow flex flex-col justify-center">
                            <span class="text-emerald-500/50 text-[10px] font-mono mb-2">GERMAN TRANSLATION</span>
                            <div id="german-text" class="text-xl md:text-2xl font-bold text-emerald-400 leading-relaxed">
                                <!-- Answer text -->
                            </div>
                        </div>
                        
                        <div id="scoring-section" class="mt-4 border-t border-slate-800 pt-4">
                            <p id="selection-label" class="text-[10px] text-slate-500 uppercase tracking-widest mb-2 text-center">Select Astronauts:</p>
                            <div id="point-buttons" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-1 mb-4 max-h-24 overflow-y-auto p-1 custom-scrollbar">
                                <!-- Buttons -->
                            </div>
                            <button id="confirm-btn" onclick="confirmPoints()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 rounded font-bold text-sm transition-all shadow-lg">
                                Confirm & Next
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Full Verb Library
        const mainVerbs = [
            // SEIN Verbs (Crucial for first few rounds)
            { de: "gehen", aux: "ist", steps: [
                { en: "to go - gone", de: "gehen - ist gegangen" },
                { en: "I have gone to the cinema with my friends.", de: "Ich bin mit meinen Freunden ins Kino gegangen." },
                { en: "...because I have gone to the park.", de: "...weil ich in den Park gegangen bin." },
                { en: "I will go to Germany next year.", de: "Ich werde nächstes Jahr nach Deutschland gehen." },
                { en: "I would go to the party if I had time.", de: "Ich würde auf die Party gehen, wenn ich Zeit hätte." }
            ]},
            { de: "fahren", aux: "ist", steps: [
                { en: "to drive/travel - travelled", de: "fahren - ist gefahren" },
                { en: "He has travelled to Berlin in his new car.", de: "Er ist mit seinem neuen Auto nach Berlin gefahren." },
                { en: "...that he is driving to the mountains tomorrow.", de: "...dass er morgen in die Berge fährt." },
                { en: "We will travel to Switzerland in the summer.", de: "Wir werden im Sommer in die Schweiz fahren." },
                { en: "I would drive if I had a driving licence.", de: "Ich würde fahren, wenn ich einen Führerschein hätte." }
            ]},
            { de: "bleiben", aux: "ist", steps: [
                { en: "to stay - stayed", de: "bleiben - ist geblieben" },
                { en: "We have stayed at home for the whole weekend.", de: "Wir sind das ganze Wochenende zu Hause geblieben." },
                { en: "...although I am staying with my grandmother.", de: "...obwohl ich bei meiner Großmutter bleibe." },
                { en: "They will stay in a hotel near the beach.", de: "Sie werden in einem Hotel in der Nähe vom Strand bleiben." },
                { en: "I would stay longer, but I have to go.", de: "Ich würde länger bleiben, aber ich muss gehen." }
            ]},

            // HABEN Verbs
            { de: "besichtigen", aux: "hat", steps: [
                { en: "to visit (sights) - visited", de: "besichtigen - hat besichtigt" },
                { en: "We have visited the old castle in the town centre.", de: "Wir haben das alte Schloss in der Stadtmitte besichtigt." },
                { en: "I'm going to Berlin in order to visit the museum.", de: "Ich fahre nach Berlin, um das Museum zu besichtigen." },
                { en: "Will you visit the sights next week?", de: "Wirst du nächste Woche die Sehenswürdigkeiten besichtigen?" },
                { en: "I would visit the gallery if it weren't closed.", de: "Ich würde die Galerie besichtigen, wenn sie nicht geschlossen wäre." }
            ]},
            { de: "übernachten", aux: "hat", steps: [
                { en: "to stay overnight - stayed overnight", de: "übernachten - hat übernachtet" },
                { en: "I have stayed overnight at my friend's house.", de: "Ich habe bei meinem Freund übernachtet." },
                { en: "It is expensive to stay overnight in a hotel.", de: "Es ist teuer, in einem Hotel zu übernachten." },
                { en: "They will stay overnight in London.", de: "Sie werden in London übernachten." },
                { en: "We would stay overnight if there was a room.", de: "Wir würden übernachten, wenn es ein Zimmer gäbe." }
            ]},
            { de: "benutzen", aux: "hat", steps: [
                { en: "to use - used", de: "benutzen - hat benutzt" },
                { en: "He has used his mobile phone during the lesson.", de: "Er hat sein Handy während der Stunde benutzt." },
                { en: "I love using my computer for my homework.", de: "Ich liebe es, meinen Computer für meine Hausaufgaben zu benutzen." },
                { en: "I will use the bus to get to school.", de: "Ich werde den Bus benutzen, um zur Schule zu kommen." },
                { en: "I would use my bike if it weren't broken.", de: "Ich würde mein Rad benutzen, wenn es nicht kaputt wäre." }
            ]},
            { de: "lernen", aux: "hat", steps: [
                { en: "to learn/study - learned", de: "lernen - hat gelernt" },
                { en: "She has learned a lot of new words today.", de: "Sie hat heute viele neue Wörter gelernt." },
                { en: "I try to study every evening for my exams.", de: "Ich versuche, jeden Abend für meine Prüfungen zu lernen." },
                { en: "We will learn more about German history.", de: "Wir werden mehr über die deutsche Geschichte lernen." },
                { en: "I would learn Spanish if I had more time.", de: "Ich würde Spanisch lernen, wenn ich mehr Zeit hätte." }
            ]},
            { de: "lieben", aux: "hat", steps: [
                { en: "to love - loved", de: "lieben - hat geliebt" },
                { en: "I have always loved playing football.", de: "Ich habe es schon immer geliebt, Fußball zu spielen." },
                { en: "I love spending time with my family.", de: "Ich liebe es, Zeit mit meiner Familie zu verbringen." },
                { en: "You will love the food in this restaurant.", de: "Du wirst das Essen in diesem Restaurant lieben." },
                { en: "I would love to go to the cinema tonight.", de: "Ich würde es lieben, heute Abend ins Kino zu gehen." }
            ]},
            { de: "hoffen", aux: "hat", steps: [
                { en: "to hope - hoped", de: "hoffen - hat gehofft" },
                { en: "We have hoped for better weather.", de: "Wir haben auf besseres Wetter gehofft." },
                { en: "I hope to see you soon.", de: "Ich hoffe, dich bald zu sehen." },
                { en: "He will hope that the test is easy.", de: "Er wird hoffen, dass der Test einfach ist." },
                { en: "I would hope for a better result.", de: "Ich würde auf ein besseres Ergebnis hoffen." }
            ]},
            { de: "einladen", aux: "hat", steps: [
                { en: "to invite - invited", de: "einladen - hat eingeladen" },
                { en: "I have invited all my friends to my party.", de: "Ich habe alle meine Freunde zu meiner Party eingeladen." },
                { en: "I'm calling you in order to invite you.", de: "Ich rufe dich an, um dich einzuladen." },
                { en: "Will you invite your cousin too?", de: "Wirst du deinen Cousin auch einladen?" },
                { en: "I would invite him if I liked him.", de: "Ich würde ihn einladen, wenn ich ihn mögen würde." }
            ]},
            { de: "verbringen", aux: "hat", steps: [
                { en: "to spend (time) - spent", de: "verbringen - hat verbracht" },
                { en: "We have spent two weeks in Spain.", de: "Wir haben zwei Wochen in Spanien verbracht." },
                { en: "I love spending my holidays at the beach.", de: "Ich liebe es, meine Ferien am Strand zu verbringen." },
                { en: "Where will you spend your weekend?", de: "Wo wirst du dein Wochenende verbringen?" },
                { en: "I would spend more time outside if it were warm.", de: "Ich würde mehr Zeit draußen verbringen, wenn es warm wäre." }
            ]},
            { de: "gewinnen", aux: "hat", steps: [
                { en: "to win - won", de: "gewinnen - hat gewonnen" },
                { en: "Our team has won the match on Saturday.", de: "Unsere Mannschaft hat das Spiel am Samstag gewonnen." },
                { en: "It is hard to win against this team.", de: "Es ist schwer, gegen diese Mannschaft zu gewinnen." },
                { en: "I am sure that we will win.", de: "Ich bin sicher, dass wir gewinnen werden." },
                { en: "I would win if I practised more.", de: "Ich würde gewinnen, wenn ich mehr üben würde." }
            ]},
            { de: "sich beschweren", aux: "hat", steps: [
                { en: "to complain - complained", de: "sich beschweren - hat sich beschwert" },
                { en: "The guest has complained about the cold food.", de: "Der Gast hat sich über das kalte Essen beschwert." },
                { en: "I hate complaining in a restaurant.", de: "Ich hasse es, mich in einem Restaurant zu beschweren." },
                { en: "He will complain to the manager.", de: "Er wird sich beim Manager beschweren." },
                { en: "I would complain if the service were bad.", de: "Ich würde mich beschweren, wenn der Service schlecht wäre." }
            ]},
            { de: "mitbringen", aux: "hat", steps: [
                { en: "to bring along - brought along", de: "mitbringen - hat mitgebracht" },
                { en: "I have brought some cake for everyone.", de: "Ich habe Kuchen für alle mitgebracht." },
                { en: "Don't forget to bring your book along.", de: "Vergiss nicht, dein Buch mitzubringen." },
                { en: "Will you bring your dog along to the park?", de: "Wirst du deinen Hund in den Park mitbringen?" },
                { en: "I would bring a gift if I were invited.", de: "Ich würde ein Geschenk mitbringen, wenn ich eingeladen wäre." }
            ]}
        ];

        const foundations = [
            { de: "Haben (Foundations)", steps: [
                { en: "List: I have, I had, I would have", de: "Ich habe, ich hatte, ich hätte" },
                { en: "Conditional: If I had more time, I would have a better job.", de: "Wenn ich mehr Zeit hätte, hätte ich einen besseren Job." },
                { en: "Past: When I had more time, I used to read every day.", de: "Als ich mehr Zeit hatte, habe ich jeden Tag gelesen." }
            ]},
            { de: "Sein (Foundations)", steps: [
                { en: "List: I am, I was, I would be", de: "Ich bin, ich war, ich wäre" },
                { en: "Conditional: If it were sunny today, I would be very happy.", de: "Wenn es heute sunnig wäre, wäre ich sehr glücklich." },
                { en: "Past: When I was a child, I lived in a small village.", de: "Als ich ein Kind war, habe ich in einem kleinen Dorf gewohnt." }
            ]}
        ];

        let students = [];
        let selectedStudentIds = new Set();
        let currentVerb = null;
        let currentStepIndex = 0;
        let mandatoryIdx = 0;
        let shuffledVerbs = [];
        let gameMode = 'race';
        const WIN_SCORE = 30;

        // UI Initialization
        const studentCountInput = document.getElementById('student-count');
        const nameInputs = document.getElementById('name-inputs');

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('mode-race').className = mode === 'race' ? 'px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all' : 'px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all';
            document.getElementById('mode-solo').className = mode === 'solo' ? 'px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all' : 'px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all';
            document.getElementById('name-input-container').style.display = mode === 'solo' ? 'none' : 'block';
        }

        function updateNameFields() {
            nameInputs.innerHTML = '';
            const count = Math.min(parseInt(studentCountInput.value) || 1, 16);
            for (let i = 0; i < count; i++) {
                nameInputs.innerHTML += `<input type="text" placeholder="Astronaut ${i+1}" class="student-name-input bg-slate-800 border border-slate-700 rounded p-1 text-sm text-white outline-none focus:border-sky-500 transition-all">`;
            }
        }
        studentCountInput.addEventListener('input', updateNameFields);
        updateNameFields();

        function startGame() {
            if (gameMode === 'race') {
                const inputs = document.querySelectorAll('.student-name-input');
                students = Array.from(inputs).map((inp, idx) => ({
                    name: inp.value || `Astro ${idx+1}`,
                    score: 0,
                    id: 'std-' + idx,
                    color: getColor(idx)
                }));
                document.getElementById('tracks-container').classList.remove('hidden');
                document.getElementById('scoring-section').classList.remove('hidden');
                document.getElementById('score-info').classList.remove('hidden');
            } else {
                students = [];
                document.getElementById('tracks-container').classList.add('hidden');
                document.getElementById('scoring-section').classList.add('hidden');
                document.getElementById('score-info').classList.add('hidden');
            }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            initTracks();
            prepareVerbs();
            loadNextVerb();
        }

        function prepareVerbs() {
            // Requirement: First randomized perfects are Sein, then Haben, then Sein.
            const seins = mainVerbs.filter(v => v.aux === 'ist').sort(() => Math.random() - 0.5);
            const habens = mainVerbs.filter(v => v.aux === 'hat').sort(() => Math.random() - 0.5);
            
            const firstThree = [seins.pop(), habens.pop(), seins.pop()];
            const theRest = [...seins, ...habens].sort(() => Math.random() - 0.5);
            
            shuffledVerbs = [...firstThree, ...theRest];
        }

        function initTracks() {
            const container = document.getElementById('tracks-container');
            container.innerHTML = '<div id="stars"></div>';
            createStars();
            if (gameMode === 'solo') return;

            students.forEach((student) => {
                const track = document.createElement('div');
                track.className = 'space-track w-full relative flex items-center shrink-0';
                track.innerHTML = `
                    <div class="absolute left-1 text-[8px] font-bold text-slate-500 uppercase z-20 bg-slate-950/80 px-1 rounded">${student.name}</div>
                    <div id="rocket-${student.id}" class="rocket absolute" style="left: 2%">
                        <svg width="40" height="20" viewBox="0 0 60 30" fill="none">
                            <path d="M50 15L10 5V25L50 15Z" fill="${student.color}" />
                            <path d="M10 5L0 0V30L10 25V5Z" fill="${student.color}" opacity="0.6" />
                        </svg>
                    </div>
                    <div class="absolute right-2 text-[8px] text-slate-800 font-bold h-full flex items-center">FINISH</div>
                `;
                container.appendChild(track);
            });
        }

        function loadNextVerb() {
            if (mandatoryIdx < foundations.length) {
                currentVerb = foundations[mandatoryIdx];
                mandatoryIdx++;
            } else {
                currentVerb = shuffledVerbs.shift();
                if (!currentVerb) {
                    prepareVerbs();
                    currentVerb = shuffledVerbs.shift();
                }
            }
            currentStepIndex = 0;
            updateStepUI();
        }

        function updateStepUI() {
            const answerCard = document.getElementById('answer-card');
            answerCard.classList.remove('visible');
            
            const step = currentVerb.steps[currentStepIndex];
            document.getElementById('verb-title').innerText = currentVerb.de;
            document.getElementById('english-text').innerText = step.en;
            document.getElementById('german-text').innerText = step.de;
            
            selectedStudentIds.clear();
            
            const indicator = document.getElementById('step-indicator');
            indicator.innerHTML = '';
            currentVerb.steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `h-1.5 w-6 rounded-full transition-all duration-500 ${i === currentStepIndex ? 'bg-sky-400 shadow-[0_0_8px_rgba(56,189,248,0.5)]' : i < currentStepIndex ? 'bg-emerald-500' : 'bg-slate-700'}`;
                indicator.appendChild(dot);
            });

            updatePointButtons();
            
            // If solo mode, change the reveal button text slightly
            if (gameMode === 'solo') {
                document.getElementById('confirm-btn').innerText = "Next Step";
            } else {
                document.getElementById('confirm-btn').innerText = "Confirm & Next";
            }
        }

        function revealCurrentStep() {
            document.getElementById('answer-card').classList.add('visible');
        }

        function updatePointButtons() {
            const container = document.getElementById('point-buttons');
            container.innerHTML = '';
            students.forEach(student => {
                const btn = document.createElement('button');
                btn.className = `px-2 py-1 rounded text-[10px] font-bold transition-all border border-slate-700 bg-slate-800 text-slate-300 truncate`;
                btn.innerText = student.name;
                btn.id = `btn-${student.id}`;
                btn.onclick = () => toggleStudentSelection(student.id);
                container.appendChild(btn);
            });
        }

        function toggleStudentSelection(sid) {
            const btn = document.getElementById(`btn-${sid}`);
            if (selectedStudentIds.has(sid)) {
                selectedStudentIds.delete(sid);
                btn.classList.remove('selected-point');
            } else {
                selectedStudentIds.add(sid);
                btn.classList.add('selected-point');
            }
        }

        function confirmPoints() {
            if (gameMode === 'race') {
                selectedStudentIds.forEach(sid => {
                    const student = students.find(s => s.id === sid);
                    student.score++;
                    const rocket = document.getElementById(`rocket-${student.id}`);
                    const percent = Math.min(2 + (student.score / WIN_SCORE) * 92, 94);
                    rocket.style.left = percent + '%';
                    
                    if (student.score >= WIN_SCORE) {
                        showWinner(student.name);
                    }
                });
            }

            currentStepIndex++;
            if (currentStepIndex >= currentVerb.steps.length) {
                loadNextVerb();
            } else {
                updateStepUI();
            }
        }

        function nextVerb() {
            loadNextVerb();
        }

        function getColor(i) {
            return ['#38bdf8', '#fb7185', '#34d399', '#facc15', '#a78bfa', '#fb923c', '#818cf8', '#2dd4bf', '#fb923c', '#94a3b8', '#f472b6', '#4ade80', '#60a5fa', '#f87171', '#c084fc', '#475569'][i % 16];
        }

        function createStars() {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function showWinner(name) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-slate-950/95 flex items-center justify-center z-[100] p-6 backdrop-blur-md';
            modal.innerHTML = `
                <div class="bg-slate-900 p-10 rounded-[3rem] border-4 border-sky-500 text-center shadow-2xl">
                    <div class="text-7xl mb-4">🏆</div>
                    <h2 class="text-4xl font-bold mb-1">Space Champion!</h2>
                    <p class="text-2xl text-sky-400 mb-6">${name}</p>
                    <button onclick="location.reload()" class="bg-sky-600 px-8 py-3 rounded-full font-bold hover:bg-sky-500 transition-all">
                        New Mission
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
