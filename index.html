<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>German Tense Rocket Race - Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Question Area at Top - Reduced height */
        #question-area {
            height: 48%;
            background: #0f172a;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #1e293b;
            z-index: 30;
        }

        /* Rocket Area at Bottom - Increased height */
        #rocket-area {
            height: 52%;
            background: #020617;
            position: relative;
            overflow-y: auto;
            border-top: 1px solid #334155;
        }

        .space-track {
            background: linear-gradient(90deg, rgba(30,41,59,0.3) 0%, rgba(15,23,42,0.6) 100%);
            border-bottom: 1px solid #1e293b;
            position: relative;
            height: 42px; 
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .rocket {
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
            position: absolute;
            z-index: 10;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        #answer-card {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }
        #answer-card.visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transition: opacity 0.2s ease-in-out;
        }

        .verb-box {
            transition: all 0.2s ease;
        }
        .verb-box.completed {
            background-color: #eab308 !important; 
            color: #0f172a !important;
            border-color: #facc15 !important;
        }
        .verb-box.active {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .selected-point {
            background-color: #10b981 !important; 
            border-color: #34d399 !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950 overflow-y-auto">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-700 shadow-2xl max-w-2xl w-full my-auto">
            <h1 class="text-3xl font-bold mb-2 text-center text-sky-400">German Rocket Race</h1>
            <p class="text-slate-500 text-center mb-6 text-sm">Auxiliaries, "um...zu" clauses & Full Foundations</p>
            
            <div class="space-y-6">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between bg-slate-800/50 p-4 rounded-xl">
                    <div class="flex items-center gap-4">
                        <label class="text-sm font-medium text-slate-400">Astronauts (1-16):</label>
                        <input type="number" id="student-count" min="1" max="16" value="4" 
                               class="w-20 bg-slate-800 border border-slate-600 rounded p-2 text-white outline-none focus:ring-2 focus:ring-sky-500">
                    </div>
                    <div class="flex gap-2">
                        <button id="mode-race" onclick="setMode('race')" class="px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all">Race Mode</button>
                        <button id="mode-solo" onclick="setMode('solo')" class="px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all">Solo/Practice</button>
                    </div>
                </div>

                <div id="name-input-container">
                    <div id="name-inputs" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Names generated here -->
                    </div>
                </div>

                <button onclick="startGame()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-900/20 uppercase tracking-widest">
                    Ignition & Launch
                </button>
            </div>
        </div>
    </div>

    <!-- Question Area (Top) -->
    <div id="question-area" class="hidden">
        <div class="max-w-6xl mx-auto w-full flex flex-col h-full">
            <div class="flex justify-between items-center mb-2">
                <div>
                    <h2 id="verb-title" class="text-sky-400 font-bold text-xl uppercase tracking-widest leading-none">Verb</h2>
                    <div id="step-indicator" class="flex gap-2 mt-2"></div>
                </div>
                <div class="flex gap-2">
                    <span id="score-info" class="hidden text-[10px] text-slate-500 self-center mr-4">Target: 30 Points</span>
                    <button onclick="nextVerb()" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2 border border-slate-700 transition-all">
                        Skip Verb <span>⏭️</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 flex-grow overflow-hidden pb-1">
                <!-- English Side -->
                <div id="challenge-card" onclick="revealCurrentStep()" class="bg-slate-800/50 border-2 border-dashed border-sky-500/30 rounded-xl p-4 cursor-pointer hover:border-sky-500/60 transition-all flex flex-col items-center justify-center text-center group overflow-y-auto custom-scrollbar">
                    <span class="text-sky-500/50 text-[9px] font-mono mb-1 group-hover:text-sky-400 uppercase">Challenge</span>
                    <div id="english-text" class="text-md md:text-lg font-medium leading-snug"></div>
                    <div class="mt-2 text-sky-500 text-[9px] animate-bounce opacity-50">Click to reveal German</div>
                </div>

                <!-- German Side -->
                <div id="answer-card" class="bg-emerald-900/5 border-2 border-emerald-500/10 rounded-xl p-3 flex flex-col overflow-hidden">
                    <div class="text-center flex-grow flex flex-col justify-center">
                        <span class="text-emerald-500/50 text-[9px] font-mono mb-1 uppercase">Solution</span>
                        <div id="german-text" class="text-md md:text-xl font-bold text-emerald-400 leading-snug"></div>
                    </div>
                    
                    <div id="scoring-section" class="mt-2 border-t border-slate-800 pt-2">
                        <div id="race-controls">
                            <p id="selection-label" class="text-[9px] text-slate-500 uppercase tracking-widest mb-1 text-center">Correct Astronauts:</p>
                            <div id="point-buttons" class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-1 mb-2 max-h-20 overflow-y-auto p-1 custom-scrollbar"></div>
                        </div>
                        <button id="confirm-btn" onclick="confirmPoints()" class="w-full py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded font-bold text-xs transition-all shadow-lg">
                            Confirm & Next
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rocket Area (Bottom) -->
    <div id="rocket-area" class="hidden custom-scrollbar">
        <div id="stars"></div>
        
        <!-- Track Container -->
        <div id="tracks-container" class="flex flex-col w-full min-h-full"></div>

        <!-- Solo Panel overlay -->
        <div id="solo-selection-panel" class="hidden absolute inset-0 flex flex-col p-4 z-40 bg-slate-950/90 overflow-hidden">
            <div class="flex justify-between items-center mb-2 px-2">
                <h3 class="text-sky-400 font-bold uppercase tracking-widest text-xs">Mission Selector</h3>
                <span id="solo-counter" class="text-slate-500 text-[10px] font-mono">0 / 0 Completed</span>
            </div>
            <div id="verb-grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2 overflow-y-auto custom-scrollbar pr-2 pb-10"></div>
        </div>
    </div>

        const foundations = [
            { de: "Haben (Foundations)", steps: [
                { en: "Present: I have, I had, I would have", de: "Ich habe, ich hatte, ich hätte" },
                { en: "Imperfect: I had a lot of stress at school last week.", de: "Ich hatte letzte Woche viel Stress in der Schule." },
                { en: "Future: I will have a big party for my birthday.", de: "Ich werde eine große Party zu meinem Geburtstag haben." },
                { en: "Conditional: I would have a dog if I lived in a house.", de: "Ich hätte einen Hund, wenn ich in einem haus wohnen würde." },
                { en: "Past Phrase: When I had more time, I used to read every day.", de: "Als ich mehr Zeit hatte, habe ich jeden Tag gelesen." }
            ]},
            { de: "Sein (Foundations)", steps: [
                { en: "Present: I am, I was, I would be", de: "Ich bin, ich war, ich wäre" },
                { en: "Imperfect: We were very tired after the long journey.", de: "Wir waren nach der langen Reise sehr müde." },
                { en: "Future: I will be at home at eight o'clock tonight.", de: "Ich werde heute Abend um acht Uhr zu Hause sein." },
                { en: "Conditional: I would be very happy if I won the race.", de: "Ich wäre sehr glücklich, wenn ich das Rennen gewinnen würde." },
                { en: "Past Phrase: When I was a child, I lived in a small village.", de: "Als ich ein kind war, habe ich in einem kleinen Dorf gewohnt." }
            ]},
            { de: "Werden (Foundations)", steps: [
                { en: "Present: I become, I became, I would become", de: "Ich werde, ich wurde, ich würde werden" },
                { en: "Imperfect: When I was young, I became ill very often.", de: "Als ich jung war, wurde ich sehr oft krank." },
                { en: "Future: I will become a doctor in the future.", de: "Ich werde in der Zukunft Arzt werden." },
                { en: "Conditional: I would become a teacher if I could.", de: "Ich würde Lehrer werden, wenn ich könnte." },
                { en: "Past Phrase: After the match, the players became very tired.", de: "Nach dem Spiel wurden die Spieler sehr müde." }
            ]}
        ];

        let students = [];
        let selectedStudentIds = new Set();
        let completedVerbs = new Set();
        let currentVerb = null;
        let currentStepIndex = 0;
        let mandatoryIdx = 0;
        let shuffledVerbs = [];
        let gameMode = 'race';
        const WIN_SCORE = 30;

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('mode-race').className = mode === 'race' ? 'px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all' : 'px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all';
            document.getElementById('mode-solo').className = mode === 'solo' ? 'px-4 py-2 rounded-lg bg-sky-600 text-xs font-bold transition-all' : 'px-4 py-2 rounded-lg bg-slate-700 text-xs font-bold transition-all';
            document.getElementById('name-input-container').style.display = mode === 'solo' ? 'none' : 'block';
        }

        function updateNameFields() {
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            let val = parseInt(document.getElementById('student-count').value);
            if (isNaN(val)) val = 1;
            const count = Math.min(Math.max(val, 1), 16);
            
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<input type="text" placeholder="Astronaut ${i+1}" class="student-name-input bg-slate-800 border border-slate-700 rounded p-1 text-sm text-white outline-none focus:border-sky-500 transition-all">`;
            }
        }
        
        document.getElementById('student-count').onchange = updateNameFields;
        document.getElementById('student-count').onblur = updateNameFields;

        function startGame() {
            if (gameMode === 'race') {
                const inputs = document.querySelectorAll('.student-name-input');
                students = Array.from(inputs).map((inp, idx) => ({
                    name: inp.value || `Astro ${idx+1}`,
                    score: 0,
                    id: 'std-' + idx,
                    color: getColor(idx)
                }));
                document.getElementById('tracks-container').style.display = 'flex';
                document.getElementById('solo-selection-panel').classList.add('hidden');
                document.getElementById('race-controls').style.display = 'block';
                document.getElementById('score-info').style.display = 'inline';
                prepareVerbs();
                loadNextVerb();
            } else {
                students = [];
                document.getElementById('tracks-container').style.display = 'none';
                document.getElementById('solo-selection-panel').classList.remove('hidden');
                document.getElementById('race-controls').style.display = 'none';
                document.getElementById('score-info').style.display = 'none';
                generateVerbGrid();
                loadSpecificVerb(foundations[0]);
            }

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            document.getElementById('rocket-area').classList.remove('hidden');
            initTracks();
        }

        function generateVerbGrid() {
            const grid = document.getElementById('verb-grid');
            grid.innerHTML = '';
            const allAvailable = [...foundations, ...mainVerbs];
            document.getElementById('solo-counter').innerText = `${completedVerbs.size} / ${allAvailable.length} Completed`;

            allAvailable.forEach((verb) => {
                const box = document.createElement('div');
                const isComplete = completedVerbs.has(verb.de);
                const isActive = currentVerb && currentVerb.de === verb.de;
                box.className = `verb-box p-2 bg-slate-800 border-2 border-slate-700 rounded text-[9px] font-bold text-center cursor-pointer hover:bg-slate-700 ${isComplete ? 'completed' : ''} ${isActive ? 'active' : ''}`;
                box.innerText = verb.de;
                box.onclick = () => loadSpecificVerb(verb);
                grid.appendChild(box);
            });
        }

        function loadSpecificVerb(verb) {
            currentVerb = verb;
            currentStepIndex = 0;
            if (gameMode === 'solo') generateVerbGrid();
            updateStepUI();
        }

        function prepareVerbs() {
            const seins = mainVerbs.filter(v => v.aux === 'ist').sort(() => Math.random() - 0.5);
            const habens = mainVerbs.filter(v => v.aux === 'hat').sort(() => Math.random() - 0.5);
            
            const firstThree = [seins.pop(), habens.pop(), seins.pop()];
            const theRest = [...seins, ...habens].sort(() => Math.random() - 0.5);
            shuffledVerbs = [...firstThree, ...theRest];
            mandatoryIdx = 0;
        }

        function initTracks() {
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';
            createStars();
            if (gameMode === 'solo') return;

            students.forEach((student) => {
                const track = document.createElement('div');
                track.className = 'space-track w-full relative shrink-0';
                track.innerHTML = `
                    <div class="absolute left-1 text-[8px] font-bold text-slate-400 uppercase z-20 bg-slate-900/80 px-1 rounded border border-slate-800">${student.name}</div>
                    <div id="rocket-${student.id}" class="rocket" style="left: 2%">
                        <svg width="40" height="20" viewBox="0 0 60 30" fill="none">
                            <path d="M50 15L10 5V25L50 15Z" fill="${student.color}" />
                            <path d="M10 5L0 0V30L10 25V5Z" fill="${student.color}" opacity="0.6" />
                            <circle cx="25" cy="15" r="3" fill="white" opacity="0.8" />
                        </svg>
                    </div>
                `;
                container.appendChild(track);
            });
        }

        function loadNextVerb() {
            if (mandatoryIdx < foundations.length) {
                currentVerb = foundations[mandatoryIdx];
                mandatoryIdx++;
            } else {
                currentVerb = shuffledVerbs.shift();
                if (!currentVerb) {
                    prepareVerbs();
                    currentVerb = shuffledVerbs.shift();
                }
            }
            currentStepIndex = 0;
            updateStepUI();
        }

        function updateStepUI() {
            const answerCard = document.getElementById('answer-card');
            answerCard.classList.remove('visible');
            const step = currentVerb.steps[currentStepIndex];
            document.getElementById('verb-title').innerText = currentVerb.de;
            document.getElementById('english-text').innerText = step.en;
            document.getElementById('german-text').innerText = step.de;
            selectedStudentIds.clear();
            
            const indicator = document.getElementById('step-indicator');
            indicator.innerHTML = '';
            currentVerb.steps.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `h-1.5 w-6 rounded-full transition-all duration-500 ${i === currentStepIndex ? 'bg-sky-400 shadow-[0_0_8px_rgba(56,189,248,0.5)]' : i < currentStepIndex ? 'bg-emerald-500' : 'bg-slate-700'}`;
                indicator.appendChild(dot);
            });

            if (gameMode === 'race') {
                updatePointButtons();
                document.getElementById('confirm-btn').innerText = "Confirm & Next";
            } else {
                document.getElementById('confirm-btn').innerText = currentStepIndex === currentVerb.steps.length - 1 ? "Complete Verb" : "Next Step";
            }
        }

        function revealCurrentStep() {
            document.getElementById('answer-card').classList.add('visible');
        }

        function updatePointButtons() {
            const container = document.getElementById('point-buttons');
            container.innerHTML = '';
            students.forEach(student => {
                const btn = document.createElement('button');
                btn.className = `px-2 py-1 rounded text-[10px] font-bold transition-all border border-slate-700 bg-slate-800 text-slate-300 truncate`;
                btn.innerText = student.name;
                btn.id = `btn-${student.id}`;
                btn.onclick = () => toggleStudentSelection(student.id);
                container.appendChild(btn);
            });
        }

        function toggleStudentSelection(sid) {
            const btn = document.getElementById(`btn-${sid}`);
            if (selectedStudentIds.has(sid)) {
                selectedStudentIds.delete(sid);
                btn.classList.remove('selected-point');
            } else {
                selectedStudentIds.add(sid);
                btn.classList.add('selected-point');
            }
        }

        function confirmPoints() {
            if (gameMode === 'race') {
                selectedStudentIds.forEach(sid => {
                    const student = students.find(s => s.id === sid);
                    student.score++;
                    const rocket = document.getElementById(`rocket-${student.id}`);
                    const percent = Math.min(2 + (student.score / WIN_SCORE) * 92, 94);
                    rocket.style.left = percent + '%';
                    if (student.score >= WIN_SCORE) showWinner(student.name);
                });
                
                currentStepIndex++;
                if (currentStepIndex >= currentVerb.steps.length) {
                    loadNextVerb();
                } else {
                    updateStepUI();
                }
            } else {
                // Solo Mode
                if (currentStepIndex === currentVerb.steps.length - 1) {
                    completedVerbs.add(currentVerb.de);
                    generateVerbGrid();
                }
                currentStepIndex++;
                if (currentStepIndex >= currentVerb.steps.length) {
                    currentStepIndex = currentVerb.steps.length - 1;
                } else {
                    updateStepUI();
                }
            }
        }

        function nextVerb() { 
            if (gameMode === 'race') loadNextVerb(); 
        }

        function getColor(i) {
            return ['#38bdf8', '#fb7185', '#34d399', '#facc15', '#a78bfa', '#fb923c', '#818cf8', '#2dd4bf', '#fb923c', '#94a3b8', '#f472b6', '#4ade80', '#60a5fa', '#f87171', '#c084fc', '#475569'][i % 16];
        }

        function createStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px'; star.style.height = size + 'px';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function showWinner(name) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-slate-950/95 flex items-center justify-center z-[100] p-6 backdrop-blur-md';
            modal.innerHTML = `
                <div class="bg-slate-900 p-10 rounded-[3rem] border-4 border-sky-500 text-center shadow-2xl">
                    <div class="text-7xl mb-4">🏆</div>
                    <h2 class="text-4xl font-bold mb-1">Space Champion!</h2>
                    <p class="text-2xl text-sky-400 mb-6">${name}</p>
                    <button onclick="location.reload()" class="bg-sky-600 px-8 py-3 rounded-full font-bold hover:bg-sky-500 transition-all">New Mission</button>
                </div>`;
            document.body.appendChild(modal);
        }

        window.onload = () => {
            updateNameFields();
            createStars();
        }
    </script>
</body>
</html>
